name: Credit Scoring Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ÉTAPE 1 : Test et Lint
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: python -m pytest -q

      - name: Smoke build Docker image
        run: docker build -t creditloanprediction:ci .

      - name: Smoke test Docker container
        run: |
          docker run -d --rm --name creditloanprediction-ci -p 18000:8000 -p 18501:8501 creditloanprediction:ci
          trap 'docker stop creditloanprediction-ci' EXIT
          for attempt in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:18000/health; then
              break
            fi
            sleep 2
          done
          curl -fsS -X POST http://127.0.0.1:18000/predict \
            -H 'content-type: application/json' \
            -d '{"loan_amt_outstanding":5000,"total_debt_outstanding":10000,"income":40000,"years_employed":5,"fico_score":650}'

  # ÉTAPE 2 : Build Docker et Push vers ECR + Deploy vers ECS
  build-and-push:
    needs: test-and-lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: credit-scoring-app
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to Amazon ECS
        run: |
          aws ecs update-service --cluster credit-scoring-cluster \
                                 --service credit-scoring-task-service-4zcsf95g \
                                 --force-new-deployment \
                                 --region ${{ secrets.AWS_REGION }}